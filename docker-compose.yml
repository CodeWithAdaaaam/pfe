version: '3.8'

services:
  db:
    image: ankane/pgvector:latest 
    container_name: learnai-db
    restart: always
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password_pfe
      POSTGRES_DB: learnai_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: learnai-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: